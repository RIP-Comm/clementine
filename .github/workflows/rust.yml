name: Rust

on:
  push:
    branches: ["main"]
    paths:
      - "src/**/*"
      - "ui/**/*"
      - "emu/**/*"
      - "scripts/**/*"
      - ".github/workflows/**/*"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**/*"
      - "ui/**/*"
      - "emu/**/*"
      - "scripts/**/*"
      - ".github/workflows/**/*"

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Setup just
        uses: extractions/setup-just@v3

      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy, rustfmt

      - name: Check fmt
        run: cargo fmt -- --check

      - name: Check clippy
        run: just lint

  test:
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Setup just
        uses: extractions/setup-just@v3
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: Test
        run: just test

  test-roms:
    needs: [lint]
    runs-on: ubuntu-latest
    # The BIOS is copyrighted and cannot be vendored. When the GBA_BIOS_BASE64
    # secret is set the harness runs for real; otherwise it skips and stays green.
    env:
      GBA_BIOS_BASE64: ${{ secrets.GBA_BIOS_BASE64 }}
    steps:
      - name: Setup just
        uses: extractions/setup-just@v3
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95.0

      - name: Fetch test ROMs
        run: |
          ./scripts/fetch-test-roms.sh "$RUNNER_TEMP/gba-tests"
          echo "CLEMENTINE_TEST_ROMS=$RUNNER_TEMP/gba-tests" >> "$GITHUB_ENV"

      - name: Provide BIOS if available
        if: ${{ env.GBA_BIOS_BASE64 != '' }}
        run: echo "$GBA_BIOS_BASE64" | base64 -d > gba_bios.bin

      - name: Run accuracy harness
        run: just test-roms
